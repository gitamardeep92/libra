<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>LibraryDesk — Run Your Library Like a Pro</title>
    <meta name="description" content="Manage students, seats, attendance, payments and more — all in one place." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LibraryDesk" />
    <meta name="theme-color" content="#e8a838" />
    <meta name="msapplication-TileColor" content="#0a0c10" />
    <meta name="msapplication-TileImage" content="/icons/icon-144.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144.png" />
    <link rel="apple-touch-icon" sizes="96x96" href="/icons/icon-96.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="shortcut icon" href="/icons/icon-96.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <style>
      html,body{background:#0a0c10;margin:0;padding:0;}
      #root{min-height:100vh;}
      body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right);}
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(r => console.log('SW:', r.scope))
            .catch(e => console.log('SW error:', e));
        });
      }
      let _pwa;
      window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); _pwa = e; window._pwaPrompt = e; });
    </script>
  </body>
</html>
